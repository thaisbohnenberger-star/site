<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Desafio</title>
</head>
    <style>
        .linha{
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
        }
        .coluna{
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .flexbox-container{
            width: 550px;
            margin: auto;
            padding: 20px;
            border: 1px solid #000;
        }
    </style>
<body>
<div class="flexbox-container">
	<form>
	<div class="linha">
		<div class="coluna">
			<label>Nome:</label></th>
            <input type="text" name="nome">
        </div>

    <br>

        	<th><label>Sobrenome:</label></th>
        	<input type="text" name="sobrenome">
    </div>

    <br>

    <div class="linha">
    	<div class="coluna">
    		<th><label>Cpf:</label></th>
    		<input type="text" 
    			   id="cpf" 
  				   name="cpf" 
   				   placeholder="000.000.000-00" 
   				   maxlength="14"
   				   required>
   		</div>
   	</div>

   	<br>

   	<div class="linha">
   		<div class="coluna">
   			<th><label>Email:</label></th>
   			<input type="email" name="email">
   		</div>
   	</div>

   	<br>

   	<div class="linha">
   		<div class="coluna">
   			<th><label>Whatsapp:</label></th>
   			<input type="phone"
  		           id="whatsapp" 
  				   name="whatsApp" 
   				   placeholder="(00) 0000-0000" 
   				   maxlength="14"
   				   required>
   		</div>
   	</div>

   	<br>

    <div class="linha">
    	<div class="coluna">
    		<th><label>Data de nascimento:</label></th>
    		<input type="date">
   		</div>
   	</div>

   	<br>

   	<div class="linha">
   		<div class="coluna">
   			<th><label>Gênero:</label></th>
   			<select id="genero">Gênero>
		<option value ="">Informe seu gênero:</option>
		<option value ="">Masculino</option>
		<option value ="">Feminino</option>
		<option value ="">Prefiro não dizer</option>

		</div>

		<br>

   	<div class="linha">
   		<div class="coluna">
			<th><label for="area">Área que programo:</label></th>
		</div>
	</div>
	<br>
		<input type="radio" id="front-end" name="area" value="front-end">
		Front-end
		<input type="radio" id="back-end" name="area" value="back-end">
		Back-end 
		<input type="radio" id="full Stack" name="area" value="full Stack">
		Full Stack 
		</div>
	</div>
	<br>

   	<div class="linha">
   		<div class="coluna">
			<th><label for="periodo">Periodo:</label></th>
		<input type="checkbox" id="manha" name="periodo" value="manha">
    	Manhã
    	<input type="checkbox" id="tarde" name="periodo" value="tarde">
    	Tarde
    	<input type="checkbox" id="noite" name="periodo" value="noite">
    	Noite
	</div>
		</div>

</body>
</html>
